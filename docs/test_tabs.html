<!DOCTYPE html>
<html>
<head>
    <title>Test Tabs</title>
    <style>
        .tabs-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 10px 20px;
            background: #ddd;
            border: none;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #667eea;
            color: white;
        }
        .tab-content {
            display: none;
            padding: 20px;
            border: 1px solid #ddd;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <h1>Test Tab Switching</h1>
    
    <nav class="tabs-nav">
        <button class="tab-btn active" data-tab="segment">Tab 1</button>
        <button class="tab-btn" data-tab="bds500eval">Tab 2</button>
        <button class="tab-btn" data-tab="history">Tab 3</button>
    </nav>
    
    <div class="tab-content active" id="tabSegment">
        <h2>Tab 1 Content</h2>
        <p>This is tab 1</p>
    </div>
    
    <div class="tab-content" id="tabBDS500Eval">
        <h2>Tab 2 Content</h2>
        <p>This is tab 2</p>
    </div>
    
    <div class="tab-content" id="tabHistory">
        <h2>Tab 3 Content</h2>
        <p>This is tab 3</p>
    </div>
    
    <script>
        console.log('Script loaded');
        
        const tabButtons = document.querySelectorAll('.tab-btn');
        console.log('Found tab buttons:', tabButtons.length);
        
        tabButtons.forEach(btn => {
            console.log('Adding click listener to tab:', btn.dataset.tab);
            btn.addEventListener('click', () => {
                const tabName = btn.dataset.tab;
                console.log('Tab clicked:', tabName);
                
                // Update buttons
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Update content
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                if (tabName === 'segment') {
                    document.getElementById('tabSegment').classList.add('active');
                } else if (tabName === 'bds500eval') {
                    document.getElementById('tabBDS500Eval').classList.add('active');
                } else if (tabName === 'history') {
                    document.getElementById('tabHistory').classList.add('active');
                }
            });
        });
        
        console.log('Tab switching initialized');
    </script>
</body>
</html>
